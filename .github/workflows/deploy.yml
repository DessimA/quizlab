name: Production — CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Executar Testes em Produção
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rodar testes de produção
        run: npm test